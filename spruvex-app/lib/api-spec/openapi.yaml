openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: POS & Repair Management System API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: products
    description: Product and inventory management
  - name: categories
    description: Product categories
  - name: customers
    description: Customer management
  - name: sales
    description: POS sales and transactions
  - name: repairs
    description: Repair ticket management
  - name: expenses
    description: Expense and accounting
  - name: accounting
    description: Chart of accounts, journal entries, and trial balance
  - name: cash-sessions
    description: Daily cash sessions
  - name: reports
    description: Reports and analytics
  - name: settings
    description: Application settings

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── CATEGORIES ───────────────────────────────────────────────────
  /categories:
    get:
      operationId: getCategories
      tags: [categories]
      summary: List all categories
      responses:
        "200":
          description: Category list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
    post:
      operationId: createCategory
      tags: [categories]
      summary: Create a category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"

  /categories/{id}:
    put:
      operationId: updateCategory
      tags: [categories]
      summary: Update a category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
    delete:
      operationId: deleteCategory
      tags: [categories]
      summary: Delete a category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── PRODUCTS ─────────────────────────────────────────────────────
  /products:
    get:
      operationId: getProducts
      tags: [products]
      summary: List products
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: categoryId
          in: query
          schema:
            type: integer
        - name: lowStock
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: Product list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      operationId: createProduct
      tags: [products]
      summary: Create a product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    put:
      operationId: updateProduct
      tags: [products]
      summary: Update a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    delete:
      operationId: deleteProduct
      tags: [products]
      summary: Delete a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /products/barcode/{barcode}:
    get:
      operationId: getProductByBarcode
      tags: [products]
      summary: Look up a product by barcode
      parameters:
        - name: barcode
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found

  # ─── CUSTOMERS ────────────────────────────────────────────────────
  /customers:
    get:
      operationId: getCustomers
      tags: [customers]
      summary: List customers
      parameters:
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Customer list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Customer"
    post:
      operationId: createCustomer
      tags: [customers]
      summary: Create a customer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"

  /customers/{id}:
    get:
      operationId: getCustomer
      tags: [customers]
      summary: Get a customer with history
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Customer with history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerDetail"
    put:
      operationId: updateCustomer
      tags: [customers]
      summary: Update a customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
    delete:
      operationId: deleteCustomer
      tags: [customers]
      summary: Delete a customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── CASH SESSIONS ────────────────────────────────────────────────
  /cash-sessions:
    get:
      operationId: getCashSessions
      tags: [cash-sessions]
      summary: List cash sessions
      responses:
        "200":
          description: Cash sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CashSession"
    post:
      operationId: openCashSession
      tags: [cash-sessions]
      summary: Open a new cash session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CashSessionInput"
      responses:
        "201":
          description: Opened
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CashSession"

  /cash-sessions/active:
    get:
      operationId: getActiveCashSession
      tags: [cash-sessions]
      summary: Get the currently active cash session
      responses:
        "200":
          description: Active session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CashSession"
        "404":
          description: No active session

  /cash-sessions/{id}/close:
    post:
      operationId: closeCashSession
      tags: [cash-sessions]
      summary: Close a cash session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CashSessionClose"
      responses:
        "200":
          description: Closed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CashSession"

  # ─── SALES ────────────────────────────────────────────────────────
  /sales:
    get:
      operationId: getSales
      tags: [sales]
      summary: List sales
      parameters:
        - name: from
          in: query
          schema:
            type: string
            format: date
        - name: to
          in: query
          schema:
            type: string
            format: date
        - name: customerId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Sale list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Sale"
    post:
      operationId: createSale
      tags: [sales]
      summary: Create a new sale (checkout)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaleInput"
      responses:
        "201":
          description: Sale created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Sale"

  /sales/{id}:
    get:
      operationId: getSale
      tags: [sales]
      summary: Get a sale with line items
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Sale detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SaleDetail"

  /sales/{id}/return:
    post:
      operationId: returnSale
      tags: [sales]
      summary: Process a return for a sale
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReturnInput"
      responses:
        "200":
          description: Return processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Sale"

  # ─── REPAIRS ──────────────────────────────────────────────────────
  /repairs:
    get:
      operationId: getRepairs
      tags: [repairs]
      summary: List repair tickets
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [received, under_inspection, waiting_parts, in_repair, completed, delivered]
        - name: search
          in: query
          schema:
            type: string
        - name: customerId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Repair list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Repair"
    post:
      operationId: createRepair
      tags: [repairs]
      summary: Create a repair ticket
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RepairInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Repair"

  /repairs/{id}:
    get:
      operationId: getRepair
      tags: [repairs]
      summary: Get a repair ticket
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Repair
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Repair"
    put:
      operationId: updateRepair
      tags: [repairs]
      summary: Update a repair ticket
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RepairUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Repair"

  /repairs/{id}/status:
    patch:
      operationId: updateRepairStatus
      tags: [repairs]
      summary: Update repair status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RepairStatusUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Repair"

  # ─── EXPENSES ─────────────────────────────────────────────────────
  /expenses:
    get:
      operationId: getExpenses
      tags: [expenses]
      summary: List expenses
      parameters:
        - name: from
          in: query
          schema:
            type: string
            format: date
        - name: to
          in: query
          schema:
            type: string
            format: date
        - name: category
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Expense list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Expense"
    post:
      operationId: createExpense
      tags: [expenses]
      summary: Create an expense
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExpenseInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Expense"

  /expenses/{id}:
    delete:
      operationId: deleteExpense
      tags: [expenses]
      summary: Delete an expense
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── ACCOUNTING ───────────────────────────────────────────────────
  /accounting/accounts:
    get:
      operationId: getAccounts
      tags: [accounting]
      summary: List chart of accounts
      responses:
        "200":
          description: Chart of accounts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Account"
    post:
      operationId: createAccount
      tags: [accounting]
      summary: Create an account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccountInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /accounting/accounts/{id}:
    put:
      operationId: updateAccount
      tags: [accounting]
      summary: Update an account
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccountUpdateInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found

  /accounting/journal-entries:
    get:
      operationId: getJournalEntries
      tags: [accounting]
      summary: List journal entries
      parameters:
        - name: from
          in: query
          schema:
            type: string
            format: date
        - name: to
          in: query
          schema:
            type: string
            format: date
        - name: sourceType
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Journal entries with their lines
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/JournalEntryWithLines"
    post:
      operationId: createJournalEntry
      tags: [accounting]
      summary: Create a manual journal entry (debits must equal credits)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JournalEntryInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JournalEntry"
        "400":
          description: Validation error (e.g. unbalanced entry)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /accounting/trial-balance:
    get:
      operationId: getTrialBalance
      tags: [accounting]
      summary: Get the trial balance report
      parameters:
        - name: asOf
          in: query
          description: Include only journal entries dated on or before this date
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Trial balance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrialBalanceResult"

  # ─── REPORTS ──────────────────────────────────────────────────────
  /reports/dashboard:
    get:
      operationId: getDashboardStats
      tags: [reports]
      summary: Get dashboard summary stats
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /reports/sales-summary:
    get:
      operationId: getSalesSummary
      tags: [reports]
      summary: Sales summary by day for a date range
      parameters:
        - name: from
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: to
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Sales summary
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SalesSummaryItem"

  /reports/top-products:
    get:
      operationId: getTopProducts
      tags: [reports]
      summary: Top selling products
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
        - name: from
          in: query
          schema:
            type: string
            format: date
        - name: to
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Top products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TopProductItem"

  /reports/repairs-summary:
    get:
      operationId: getRepairsSummary
      tags: [reports]
      summary: Repair tickets summary by status
      responses:
        "200":
          description: Repairs summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RepairsSummary"

  /reports/profit:
    get:
      operationId: getProfitReport
      tags: [reports]
      summary: Profit report for a date range
      parameters:
        - name: from
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: to
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Profit report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfitReport"

  # ─── SETTINGS ─────────────────────────────────────────────────────
  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get application settings
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"
    put:
      operationId: updateSettings
      tags: [settings]
      summary: Update application settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SettingsInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    # ─── CATEGORY ───────────────────────────────────────────────────
    Category:
      type: object
      required: [id, name, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    CategoryInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string

    # ─── PRODUCT ────────────────────────────────────────────────────
    Product:
      type: object
      required: [id, name, sku, costPrice, sellingPrice, stock, categoryId, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        sku:
          type: string
        barcode:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        costPrice:
          type: number
        sellingPrice:
          type: number
        stock:
          type: integer
        lowStockThreshold:
          type: integer
        categoryId:
          type: ["integer", "null"]
        categoryName:
          type: ["string", "null"]
        includesTax:
          type: boolean
        createdAt:
          type: string
          format: date-time

    ProductInput:
      type: object
      required: [name, sku, costPrice, sellingPrice, stock]
      properties:
        name:
          type: string
          minLength: 1
        sku:
          type: string
        barcode:
          type: string
        description:
          type: string
        costPrice:
          type: number
          minimum: 0
        sellingPrice:
          type: number
          minimum: 0
        stock:
          type: integer
          minimum: 0
        lowStockThreshold:
          type: integer
          minimum: 0
          default: 5
        categoryId:
          type: integer

    # ─── CUSTOMER ───────────────────────────────────────────────────
    Customer:
      type: object
      required: [id, name, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        phone:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        outstandingBalance:
          type: number
        totalPurchases:
          type: integer
        createdAt:
          type: string
          format: date-time

    CustomerInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
        phone:
          type: string
        email:
          type: string
        address:
          type: string
        outstandingBalance:
          type: number

    CustomerDetail:
      type: object
      required: [id, name, createdAt, recentSales, recentRepairs]
      properties:
        id:
          type: integer
        name:
          type: string
        phone:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        outstandingBalance:
          type: number
        totalPurchases:
          type: integer
        createdAt:
          type: string
          format: date-time
        recentSales:
          type: array
          items:
            $ref: "#/components/schemas/Sale"
        recentRepairs:
          type: array
          items:
            $ref: "#/components/schemas/Repair"

    # ─── CASH SESSION ───────────────────────────────────────────────
    CashSession:
      type: object
      required: [id, openedAt, openingBalance, status]
      properties:
        id:
          type: integer
        openedAt:
          type: string
          format: date-time
        closedAt:
          type: ["string", "null"]
        openingBalance:
          type: number
        closingBalance:
          type: ["number", "null"]
        expectedBalance:
          type: ["number", "null"]
        totalSales:
          type: number
        status:
          type: string
          enum: [open, closed]
        notes:
          type: ["string", "null"]

    CashSessionInput:
      type: object
      required: [openingBalance]
      properties:
        openingBalance:
          type: number
          minimum: 0
        notes:
          type: string

    CashSessionClose:
      type: object
      required: [closingBalance]
      properties:
        closingBalance:
          type: number
          minimum: 0
