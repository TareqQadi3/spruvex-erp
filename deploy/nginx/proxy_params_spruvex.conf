# Shared proxy_pass settings — included by every location block in nginx.conf
# so upstream services see the real client IP/host/protocol (required for
# api-server's TRUST_PROXY=true handling and for CORS/ALLOWED_ORIGINS checks
# that depend on the original Host).
proxy_http_version 1.1;
proxy_set_header Host $host;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header Upgrade $http_upgrade;
proxy_set_header Connection "upgrade";
proxy_read_timeout 60s;
