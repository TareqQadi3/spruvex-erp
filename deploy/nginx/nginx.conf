# Reverse proxy template — ready to deploy, not a finished config: replace
# every `CHANGE_ME` (domain names, cert paths) before use. Terminates TLS,
# proxies /api/* to the api-server container, and serves pos-system /
# spruvex-site as the app and marketing site respectively.
#
# Certificates: point ssl_certificate/ssl_certificate_key at real files
# (e.g. from Let's Encrypt via certbot, or your host's cert manager) mounted
# into /etc/nginx/certs (see docker-compose.yml's nginx service volume).
# This file intentionally does NOT bake in a certbot/ACME flow — obtaining
# certificates depends on which registrar/DNS/host you actually deploy to,
# which isn't decided yet (see Phase 11 report: domain not registered).

worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  keepalive_timeout 65;

  # Rate limiting at the edge, in front of the API's own per-tenant/per-IP
  # limiter (defense in depth — this catches raw volumetric abuse before it
  # even reaches the app process).
  limit_req_zone $binary_remote_addr zone=api_general:10m rate=20r/s;
  limit_req_zone $binary_remote_addr zone=api_auth:10m rate=5r/m;

  # Redirect all plain HTTP to HTTPS.
  server {
    listen 80;
    server_name CHANGE_ME_app.spruvex.com CHANGE_ME_api.spruvex.com CHANGE_ME.spruvex.com;
    location / {
      return 301 https://$host$request_uri;
    }
  }

  # --- API ---------------------------------------------------------------
  server {
    listen 443 ssl;
    http2 on;
    server_name CHANGE_ME_api.spruvex.com;

    ssl_certificate     /etc/nginx/certs/CHANGE_ME_api/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/CHANGE_ME_api/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 10m;

    location /api/auth/login {
      limit_req zone=api_auth burst=5 nodelay;
      proxy_pass http://api:5000;
      include /etc/nginx/proxy_params_spruvex.conf;
    }

    location /api/auth/register {
      limit_req zone=api_auth burst=5 nodelay;
      proxy_pass http://api:5000;
      include /etc/nginx/proxy_params_spruvex.conf;
    }

    location / {
      limit_req zone=api_general burst=40 nodelay;
      proxy_pass http://api:5000;
      include /etc/nginx/proxy_params_spruvex.conf;
    }
  }

  # --- pos-system (the app) -----------------------------------------------
  server {
    listen 443 ssl;
    http2 on;
    server_name CHANGE_ME_app.spruvex.com;

    ssl_certificate     /etc/nginx/certs/CHANGE_ME_app/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/CHANGE_ME_app/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;

    location / {
      proxy_pass http://pos-system:80;
      include /etc/nginx/proxy_params_spruvex.conf;
    }
  }

  # --- spruvex-site (marketing) --------------------------------------------
  server {
    listen 443 ssl;
    http2 on;
    server_name CHANGE_ME.spruvex.com;

    ssl_certificate     /etc/nginx/certs/CHANGE_ME_site/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/CHANGE_ME_site/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;

    location / {
      proxy_pass http://spruvex-site:80;
      include /etc/nginx/proxy_params_spruvex.conf;
    }
  }
}
